[tool.ruff]
line-length = 100
target-version = "py310"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501", "B008", "E402", "B007", "B905"]

[tool.black]
line-length = 100
target-version = ["py310"]

[tool.mypy]
python_version = "3.10"
pretty = true
show_error_codes = true
warn_unused_ignores = true
warn_redundant_casts = true
warn_unreachable = true
ignore_missing_imports = true
exclude = '(^tests/|^scripts/)'
no_implicit_optional = false
disable_error_code = [
  "arg-type",
  "assignment",
  "attr-defined",
  "call-overload",
  "index",
  "misc",
  "operator",
  "override",
  "return-value",
  "union-attr",
  "unused-ignore",
  "unreachable",
  "var-annotated",
]
