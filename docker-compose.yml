services:
  db:
    image: ankane/pgvector:latest
    container_name: br-korea-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: br_korea_poc
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d br_korea_poc"]
      interval: 5s
      timeout: 5s
      retries: 20

  migrate:
    build:
      context: .
    container_name: br-korea-migrate
    command: ["python", "scripts/migrate_db.py"]
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/br_korea_poc
    depends_on:
      db:
        condition: service_healthy

  load:
    build:
      context: .
    container_name: br-korea-load
    command: ["python", "scripts/load_resource_to_db.py"]
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/br_korea_poc
    volumes:
      - ./resource:/resource:ro
    depends_on:
      migrate:
        condition: service_completed_successfully

  weather-load:
    build:
      context: .
    container_name: br-korea-weather-load
    command:
      [
        "sh",
        "-c",
        "python scripts/load_weather_data.py || echo '[WARN] load_weather_data.py failed; backend startup will continue.' >&2",
      ]
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/br_korea_poc
    depends_on:
      load:
        condition: service_completed_successfully

  stockout-populate:
    build:
      context: .
    container_name: br-korea-stockout-populate
    command:
      [
        "sh",
        "-c",
        "python scripts/populate_inferred_stockout_events.py || echo '[WARN] populate_inferred_stockout_events.py failed; backend startup will continue.' >&2",
      ]
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/br_korea_poc
    depends_on:
      load:
        condition: service_completed_successfully

  poc-analytics-populate:
    build:
      context: .
    container_name: br-korea-poc-analytics-populate
    command:
      [
        "sh",
        "-c",
        "python scripts/populate_poc_010_analytics_marts.py || echo '[WARN] populate_poc_010_analytics_marts.py failed; backend startup will continue.' >&2",
      ]
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/br_korea_poc
    depends_on:
      load:
        condition: service_completed_successfully

  production-prediction-snapshot-load:
    build:
      context: .
    container_name: br-korea-production-prediction-snapshot-load
    command:
      [
        "sh",
        "-c",
        "python scripts/populate_production_prediction_snapshots.py || echo '[WARN] populate_production_prediction_snapshots.py failed; backend startup will continue.' >&2",
      ]
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/br_korea_poc
      - AI_SERVICE_URL=http://ai:6001
      - AI_SERVICE_TOKEN=br-korea-poc-ai-2026
      - STORE_CACHE_STORE_IDS=POC_010
    depends_on:
      stockout-populate:
        condition: service_completed_successfully
      ai:
        condition: service_started

  production-mart-populate:
    build:
      context: .
    container_name: br-korea-production-mart-populate
    command:
      [
        "sh",
        "-c",
        "python scripts/populate_mart_production_status.py || echo '[WARN] populate_mart_production_status.py failed; backend startup will continue.' >&2",
      ]
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/br_korea_poc
      - STORE_CACHE_STORE_IDS=POC_010
    depends_on:
      production-prediction-snapshot-load:
        condition: service_completed_successfully

  ai:
    build:
      context: ../br-korea-poc-ai
    container_name: br-korea-ai
    ports:
      - "6001:6001"
    env_file:
      - ../br-korea-poc-ai/.env
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/br_korea_poc
      - APP_PORT=6001
    depends_on:
      db:
        condition: service_healthy

  backend:
    build:
      context: .
    container_name: br-korea-backend
    ports:
      - "6002:6002"
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/br_korea_poc
      - AI_SERVICE_URL=http://ai:6001
      - AI_SERVICE_TOKEN=br-korea-poc-ai-2026
      - CORS_ORIGINS=http://localhost:5173,http://localhost:6003
      - STORE_CACHE_STORE_IDS=POC_010
    depends_on:
      weather-load:
        condition: service_completed_successfully
      stockout-populate:
        condition: service_completed_successfully
      poc-analytics-populate:
        condition: service_completed_successfully
      production-prediction-snapshot-load:
        condition: service_completed_successfully
      production-mart-populate:
        condition: service_completed_successfully
      ai:
        condition: service_started

  front:
    build:
      context: ../br-korea-poc-front
    container_name: br-korea-front
    ports:
      - "6003:6003"
    environment:
      - VITE_API_BASE_URL=http://localhost:6002
      - VITE_DEFAULT_STORE_ID=POC_010
      - VITE_DEFAULT_STORE_NAME=POC 010
      - VITE_DEFAULT_REFERENCE_DATETIME=2026-03-05T09:00
    depends_on:
      backend:
        condition: service_started

volumes:
  postgres_data:
